<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram File Explorer</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface-light: #252536;
            --primary: #7c6ff7;
            --primary-glow: #a68bfa;
            --text: #e4e2f0;
            --text-secondary: #9b99aa;
            --danger: #f0626e;
            --success: #43e97b;
            --border: #2a2a3a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e1a3a 0%, #0f0f14 70%);
        }

        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.96);
        }

        .screen.active {
            pointer-events: all;
            opacity: 1;
            transform: scale(1);
        }

        /* Логин */
        .login-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow);
            width: 400px;
            border: 1px solid var(--border);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .login-card h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), #b794f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 111, 247, 0.2);
        }

        button {
            background: var(--primary);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(124, 111, 247, 0.3);
        }

        button:hover {
            background: #917cf7;
            box-shadow: 0 6px 20px rgba(124, 111, 247, 0.5);
            transform: translateY(-1px);
        }

        button.secondary {
            background: var(--surface-light);
            box-shadow: none;
            color: var(--text-secondary);
        }
        button.secondary:hover {
            background: #33334a;
            color: white;
        }

        .error {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Группы */
        .group-screen-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow);
            width: 500px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .group-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            margin: 1.5rem 0;
            text-align: left;
        }
        .group-list li {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .group-list li:hover {
            background: var(--surface-light);
        }

        /* Файловый менеджер */
        .file-manager {
            display: flex;
            width: 100%;
            height: 100%;
            background: var(--surface);
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--surface-light);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            overflow-y: auto;
        }
        .sidebar h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: var(--primary-glow);
        }
        .tree-item {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .tree-item:hover {
            background: #333344;
            color: white;
        }
        .tree-item.active {
            background: var(--primary);
            color: white;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }
        .toolbar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .toolbar button {
            width: auto;
            padding: 0.6rem 1.4rem;
            font-size: 0.9rem;
        }
        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }
        .file-card {
            background: var(--surface-light);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            word-break: break-word;
        }
        .file-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        .file-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .file-name {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .file-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .file-actions button {
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            border-radius: 6px;
            width: auto;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        .breadcrumbs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
            color: var(--text-secondary);
        }
        .breadcrumbs span {
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .breadcrumbs span:hover {
            background: var(--surface-light);
            color: white;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="login-screen" class="screen active">
            <div class="login-card">
                <h1>📁 Telegram Drive</h1>
                <p>Ваш файловый менеджер в Telegram</p>
                <div class="input-group">
                    <label>API ID</label>
                    <input type="number" id="apiId" placeholder="123456">
                </div>
                <div class="input-group">
                    <label>API Hash</label>
                    <input type="text" id="apiHash" placeholder="abcdef...">
                </div>
                <div class="input-group">
                    <label>Номер телефона</label>
                    <input type="text" id="phoneNumber" placeholder="+79991234567">
                </div>
                <button id="loginBtn">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
        </div>

        <!-- Экран выбора группы -->
        <div id="group-screen" class="screen">
            <div class="group-screen-content">
                <h2>Выберите группу</h2>
                <ul id="groupList" class="group-list"></ul>
                <button id="createGroupBtn" class="secondary">➕ Создать закрытую группу</button>
                <div id="groupError" class="error"></div>
            </div>
        </div>

        <!-- Файловый менеджер -->
        <div id="file-manager-screen" class="screen">
            <div class="file-manager">
                <div class="sidebar">
                    <h3>📂 Диски</h3>
                    <div id="folderTree"></div>
                </div>
                <div class="main-content">
                    <div class="breadcrumbs" id="breadcrumbs"></div>
                    <div class="toolbar">
                        <button id="uploadBtn">⬆️ Загрузить файлы</button>
                        <button id="createFolderBtn" class="secondary">📁 Создать папку</button>
                    </div>
                    <div id="fileGrid" class="file-list"></div>
                    <div id="progressContainer" class="hidden"></div>
                </div>
            </div>
            <input type="file" id="fileInput" multiple hidden>
        </div>
    </div>

    <script type="module">
        import { TelegramClient } from "https://cdn.jsdelivr.net/npm/telegram@2.18.0/dist/web.js";
        import { StringSession } from "https://cdn.jsdelivr.net/npm/telegram@2.18.0/dist/sessions/index.js";

        // ---------- DOM references ----------
        const screens = {
            login: document.getElementById('login-screen'),
            group: document.getElementById('group-screen'),
            fileManager: document.getElementById('file-manager-screen'),
        };
        const apiIdInput = document.getElementById('apiId');
        const apiHashInput = document.getElementById('apiHash');
        const phoneInput = document.getElementById('phoneNumber');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const groupList = document.getElementById('groupList');
        const createGroupBtn = document.getElementById('createGroupBtn');
        const groupError = document.getElementById('groupError');
        const folderTree = document.getElementById('folderTree');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const fileGrid = document.getElementById('fileGrid');
        const uploadBtn = document.getElementById('uploadBtn');
        const createFolderBtn = document.getElementById('createFolderBtn');
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');

        let client = null;
        let currentChatId = null;
        let currentPath = []; // ['C:', 'photo', 'family']
        let driveTree = {}; // локальная модель файлов
        let lastMessageId = 0; // для сканирования

        // ---------- Helpers ----------
        function showScreen(name) {
            Object.keys(screens).forEach(key => screens[key].classList.remove('active'));
            screens[name].classList.add('active');
        }

        function escapeHtml(text) {
            return String(text).replace(/[&<>"']/g, m => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m]));
        }

        // ---------- Работа с деревом ----------
        function buildTreeFromMessages(messages) {
            const tree = {};
            for (const msg of messages) {
                if (!msg.message) continue;
                const hashtagMatch = msg.message.match(/#([A-Za-z]:?\/[^\s]+)/);
                if (!hashtagMatch) continue;
                const fullPath = hashtagMatch[1]; // например, C:/photo/family/file.jpg
                const parts = fullPath.replace(/^([A-Za-z]):?\//, '$1:/').split('/').filter(Boolean);
                if (parts.length < 1) continue;
                const drive = parts[0]; // "C:"
                if (!tree[drive]) tree[drive] = { type: 'drive', children: {} };
                let current = tree[drive].children;
                for (let i = 1; i < parts.length - 1; i++) {
                    const folderName = parts[i];
                    if (!current[folderName]) current[folderName] = { type: 'folder', children: {} };
                    current = current[folderName].children;
                }
                const fileName = parts[parts.length - 1];
                // Это файл (если есть медиа) или папка (если нет медиа и это последний элемент)
                const isFile = msg.media || msg.document || msg.photo || msg.video || msg.audio;
                if (isFile) {
                    current[fileName] = {
                        type: 'file',
                        messageId: msg.id,
                        size: msg.document?.size || msg.photo?.sizes?.[msg.photo.sizes.length - 1]?.size || 0,
                        mime: msg.document?.mimeType || '',
                    };
                } else {
                    // считаем, что это папка (пустое сообщение с тегом)
                    if (!current[fileName]) current[fileName] = { type: 'folder', children: {} };
                }
            }
            return tree;
        }

        function getCurrentFolder() {
            let node = driveTree;
            for (const segment of currentPath) {
                if (!node) return null;
                if (node.type === 'drive') node = node.children?.[segment];
                else if (node.type === 'folder') node = node.children?.[segment];
            }
            return node;
        }

        function renderFileList() {
            const folder = getCurrentFolder();
            if (!folder || folder.type !== 'folder') {
                fileGrid.innerHTML = '<p>Папка не найдена</p>';
                return;
            }
            const items = Object.entries(folder.children);
            fileGrid.innerHTML = '';
            if (items.length === 0) {
                fileGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary)">Пусто</p>';
            }
            for (const [name, item] of items) {
                const card = document.createElement('div');
                card.className = 'file-card';
                if (item.type === 'folder') {
                    card.innerHTML = `<div class="file-icon">📁</div><div class="file-name">${escapeHtml(name)}</div>`;
                    card.onclick = () => navigateToFolder(name);
                } else {
                    const sizeStr = item.size ? formatBytes(item.size) : '';
                    card.innerHTML = `
                        <div class="file-icon">📄</div>
                        <div class="file-name">${escapeHtml(name)}</div>
                        <small>${sizeStr}</small>
                        <div class="file-actions">
                            <button class="download-btn">⬇️ Скачать</button>
                        </div>`;
                    card.querySelector('.download-btn').onclick = (e) => {
                        e.stopPropagation();
                        downloadFile(item.messageId, name);
                    };
                }
                fileGrid.appendChild(card);
            }
            updateBreadcrumbs();
        }

        function navigateToFolder(name) {
            currentPath.push(name);
            renderAll();
        }

        function navigateToBreadcrumb(index) {
            currentPath = currentPath.slice(0, index + 1);
            renderAll();
        }

        function updateBreadcrumbs() {
            breadcrumbs.innerHTML = '';
            const parts = [...currentPath];
            parts.forEach((part, i) => {
                const span = document.createElement('span');
                span.textContent = part + (i < parts.length - 1 ? ' /' : '');
                span.onclick = () => navigateToBreadcrumb(i);
                breadcrumbs.appendChild(span);
            });
        }

        function renderFolderTree() {
            folderTree.innerHTML = '';
            for (const [drive, obj] of Object.entries(driveTree)) {
                if (obj.type !== 'drive') continue;
                const item = document.createElement('div');
                item.className = 'tree-item' + (currentPath[0] === drive ? ' active' : '');
                item.innerHTML = `📀 ${escapeHtml(drive)}`;
                item.onclick = () => {
                    currentPath = [drive];
                    renderAll();
                };
                folderTree.appendChild(item);
            }
        }

        function renderAll() {
            renderFolderTree();
            renderFileList();
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        // ---------- Telegram API ----------
        async function scanMessages(chatId) {
            try {
                const result = await client.getMessages(chatId, {
                    limit: 500,
                    minId: lastMessageId || 1,
                });
                if (result.length > 0) {
                    const newTree = buildTreeFromMessages(result);
                    // Объединяем с существующим деревом
                    for (const [drive, obj] of Object.entries(newTree)) {
                        if (!driveTree[drive]) driveTree[drive] = obj;
                        else mergeChildren(driveTree[drive].children, obj.children);
                    }
                    lastMessageId = Math.max(lastMessageId, ...result.map(m => m.id));
                    renderAll();
                }
            } catch (e) {
                console.warn('Scan error:', e);
            }
        }

        function mergeChildren(target, source) {
            for (const [key, srcObj] of Object.entries(source)) {
                if (!target[key]) {
                    target[key] = srcObj;
                } else if (target[key].type === 'folder' && srcObj.type === 'folder') {
                    mergeChildren(target[key].children, srcObj.children);
                } else if (target[key].type === 'file') {
                    target[key] = srcObj; // обновить
                }
            }
        }

        async function uploadFiles(files) {
            if (!currentChatId) return;
            const folder = getCurrentFolder();
            if (!folder || folder.type !== 'folder') {
                alert('Нельзя загружать в корень диска или не в папку');
                return;
            }
            const drive = currentPath[0];
            const folderPath = currentPath.slice(1).join('/');
            const tagBase = `#${drive}/${folderPath}`;

            progressContainer.classList.remove('hidden');
            for (const file of files) {
                const tag = `${tagBase}/${file.name}`;
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                const fill = document.createElement('div');
                fill.className = 'progress-fill';
                progressBar.appendChild(fill);
                progressContainer.appendChild(progressBar);

                await client.sendFile(currentChatId, {
                    file: file,
                    caption: tag,
                    progressCallback: (progress) => {
                        fill.style.width = `${Math.round(progress * 100)}%`;
                    },
                });
                progressContainer.removeChild(progressBar);
            }
            progressContainer.classList.add('hidden');
            await scanMessages(currentChatId);
        }

        async function downloadFile(messageId, filename) {
            try {
                const message = await client.getMessages(currentChatId, { ids: [messageId] });
                if (!message || message.length === 0) return alert('Сообщение не найдено');
                const msg = message[0];
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                const fill = document.createElement('div');
                fill.className = 'progress-fill';
                progressBar.appendChild(fill);
                progressContainer.appendChild(progressBar);
                const blob = await client.downloadMedia(msg, {
                    progressCallback: (progress) => {
                        fill.style.width = `${Math.round(progress * 100)}%`;
                    },
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                progressContainer.removeChild(progressBar);
            } catch (e) {
                alert('Ошибка скачивания: ' + e.message);
            }
        }

        async function createFolder(name) {
            if (!currentChatId) return;
            const folder = getCurrentFolder();
            if (!folder || folder.type !== 'folder') return alert('Нельзя создать папку здесь');
            const drive = currentPath[0];
            const folderPath = currentPath.slice(1).join('/');
            const tag = `#${drive}/${folderPath}/${name}`;
            await client.sendMessage(currentChatId, { message: tag });
            await scanMessages(currentChatId);
        }

        // ---------- UI Actions ----------
        loginBtn.addEventListener('click', async () => {
            const apiId = parseInt(apiIdInput.value.trim());
            const apiHash = apiHashInput.value.trim();
            const phone = phoneInput.value.trim();
            if (!apiId || !apiHash || !phone) {
                loginError.textContent = 'Заполните все поля';
                return;
            }
            try {
                const session = new StringSession(localStorage.getItem('tgSession') || '');
                client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });
                await client.start({
                    phoneNumber: async () => phone,
                    password: async () => prompt('Введите пароль 2FA (если есть)') || '',
                    phoneCode: async () => prompt('Введите код из Telegram') || '',
                    onError: (err) => { throw err; },
                });
                localStorage.setItem('tgSession', client.session.save());
                showScreen('group');
                await loadGroups();
            } catch (e) {
                loginError.textContent = 'Ошибка: ' + e.message;
            }
        });

        async function loadGroups() {
            try {
                const dialogs = await client.getDialogs({});
                const adminChats = [];
                for (const dialog of dialogs) {
                    if (dialog.isChannel && dialog.entity.adminRights) {
                        adminChats.push(dialog);
                    } else if (dialog.isGroup && dialog.entity.defaultBannedRights) {
                        // упрощённо: проверяем, можем ли писать
                        const me = await client.getMe();
                        const participant = await client.getParticipant(dialog.entity, me);
                        if (participant.participant.adminRights || participant.participant.creator) {
                            adminChats.push(dialog);
                        }
                    }
                }
                groupList.innerHTML = '';
                adminChats.forEach(chat => {
                    const li = document.createElement('li');
                    li.textContent = chat.title || chat.name || 'Без названия';
                    li.onclick = () => selectGroup(chat.id);
                    groupList.appendChild(li);
                });
            } catch (e) {
                groupError.textContent = 'Ошибка загрузки групп: ' + e.message;
            }
        }

        async function selectGroup(chatId) {
            currentChatId = chatId;
            lastMessageId = 0;
            driveTree = {};
            currentPath = [];
            showScreen('fileManager');
            await scanMessages(chatId);
            // Автоматически выбрать первый диск, если есть
            const drives = Object.keys(driveTree);
            if (drives.length > 0) {
                currentPath = [drives[0]];
                renderAll();
            }
            setInterval(() => scanMessages(chatId), 5000);
        }

        createGroupBtn.addEventListener('click', async () => {
            const name = prompt('Название новой закрытой группы:');
            if (!name) return;
            try {
                const result = await client.invoke(new Api.channels.CreateChannel({
                    title: name,
                    about: '',
                    megagroup: true,
                    broadcast: false,
                }));
                alert('Группа создана! Обновите список.');
                await loadGroups();
            } catch (e) {
                groupError.textContent = 'Ошибка: ' + e.message;
            }
        });

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFiles(e.target.files);
                fileInput.value = '';
            }
        });

        createFolderBtn.addEventListener('click', async () => {
            const name = prompt('Имя папки:');
            if (name) await createFolder(name);
        });

        // Автологин при наличии сессии
        (async () => {
            const savedSession = localStorage.getItem('tgSession');
            const savedApiId = localStorage.getItem('apiId');
            const savedApiHash = localStorage.getItem('apiHash');
            if (savedSession && savedApiId && savedApiHash) {
                apiIdInput.value = savedApiId;
                apiHashInput.value = savedApiHash;
                try {
                    const session = new StringSession(savedSession);
                    client = new TelegramClient(session, parseInt(savedApiId), savedApiHash, { connectionRetries: 3 });
                    await client.connect();
                    const me = await client.getMe();
                    if (me) {
                        showScreen('group');
                        await loadGroups();
                    }
                } catch (e) {
                    console.log('Автологин не удался', e);
                }
            }
            // Сохраняем api данные при ручном входе
            loginBtn.addEventListener('click', () => {
                localStorage.setItem('apiId', apiIdInput.value);
                localStorage.setItem('apiHash', apiHashInput.value);
            }, { once: true });
        })();
    </script>
</body>
</html>
